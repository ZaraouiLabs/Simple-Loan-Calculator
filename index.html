        .input-group { margin-bottom: 20px; }

        input[type="number"] { width: 100%; padding: 16px; border: 2px solid var(--border); border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; }

                    <label>Loan Amount ($)</label>

                <div class="input-group">
                    <label>Annual Interest Rate (%)</label>
                    <input type="number" id="interest-rate" placeholder="5.5" step="0.1">
                </div>
                <div class="input-group">
                    <label>Loan Term (Years)</label>
                    <input type="number" id="loan-term" placeholder="5">
                </div>
                <button class="btn-action" onclick="calculateLoan()">CALCULATE</button>

                <div id="results">
                    <div class="result-main">
                        <p style="font-size: 12px; text-transform: uppercase; color: #64748b;">Monthly Payment</p>
                        <h2 id="monthly-payment" style="font-size: 32px; color: var(--primary); margin: 0;">$0.00</h2>
                    </div>
                    <div class="result-grid">
                        <div class="result-box"><span>Principal</span><strong id="total-principal">$0.00</strong></div>

    <script>
        function calculateLoan() {
            const amount = parseFloat(document.getElementById('loan-amount').value);
            const rate = parseFloat(document.getElementById('interest-rate').value);
            const years = parseFloat(document.getElementById('loan-term').value);
            const resultsDiv = document.getElementById('results');

            if (isNaN(amount) || isNaN(rate) || isNaN(years)) return;

            const monthlyRate = rate / 100 / 12;
            const months = years * 12;
            const x = Math.pow(1 + monthlyRate, months);
            const monthly = (amount * x * monthlyRate) / (x - 1);

            const formatter = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });

            document.getElementById('monthly-payment').innerText = formatter.format(monthly);
            document.getElementById('total-principal').innerText = formatter.format(amount);
            document.getElementById('total-interest').innerText = formatter.format((monthly * months) - amount);
            resultsDiv.style.display = 'block';
        }

        const tools = [
            { name: "QR Generator", url: "https://zaraouilabs.github.io/QR-Code-Generator/" },

    </script>
